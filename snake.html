<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Step Game</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #f2f2f2;
    }

    h1 {
      margin-top: 20px;
      margin-bottom: 10px;
    }

    #game {
      border: 2px solid black;
      background: #ffffff;
    }

    #tip {
      margin-top: 10px;
      color: #444;
    }
  </style>
</head>
<body>
  <h1>Snake Step Game</h1>
  <canvas id="game"></canvas>
  <p id="tip">方向键控制：按一下走一步</p>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const gridCount = 20; // 一行/一列固定 20 格
    let cellSize = 20;
    let boardSize = 400;

    let snake = [{ x: 10, y: 10 }];
    let food = { x: 5, y: 5 };
    let score = 0;

    function resizeCanvas() {
      // 让画布大小随着窗口变化，但保持正方形
      const size = Math.min(window.innerWidth * 0.8, window.innerHeight * 0.65);
      boardSize = Math.floor(size / gridCount) * gridCount; 
      cellSize = boardSize / gridCount;

      canvas.width = boardSize;
      canvas.height = boardSize;

      draw();
    }

    function randomFoodPosition() {
      let newFood;
      let onSnake;

      do {
        onSnake = false;
        newFood = {
          x: Math.floor(Math.random() * gridCount),
          y: Math.floor(Math.random() * gridCount)
        };

        for (let part of snake) {
          if (part.x === newFood.x && part.y === newFood.y) {
            onSnake = true;
            break;
          }
        }
      } while (onSnake);

      return newFood;
    }

    function resetGame() {
      snake = [{ x: 10, y: 10 }];
      food = randomFoodPosition();
      score = 0;
      draw();
    }

    function moveSnake(event) {
      let dx = 0;
      let dy = 0;

      if (event.key === "ArrowUp") dy = -1;
      else if (event.key === "ArrowDown") dy = 1;
      else if (event.key === "ArrowLeft") dx = -1;
      else if (event.key === "ArrowRight") dx = 1;
      else return; // 不是方向键就不处理

      const head = {
        x: snake[0].x + dx,
        y: snake[0].y + dy
      };

      // 撞墙判定
      if (
        head.x < 0 ||
        head.x >= gridCount ||
        head.y < 0 ||
        head.y >= gridCount
      ) {
        alert("游戏结束！你的分数是：" + score);
        resetGame();
        return;
      }

      // 撞自己判定
      for (let part of snake) {
        if (part.x === head.x && part.y === head.y) {
          alert("撞到自己了！你的分数是：" + score);
          resetGame();
          return;
        }
      }

      snake.unshift(head);

      // 吃到食物
      if (head.x === food.x && head.y === food.y) {
        score += 1;
        food = randomFoodPosition();
      } else {
        snake.pop();
      }

      draw();
    }

    function drawGrid() {
      ctx.strokeStyle = "#e6e6e6";
      ctx.lineWidth = 1;

      for (let i = 0; i <= gridCount; i++) {
        const pos = i * cellSize;

        // 竖线
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, boardSize);
        ctx.stroke();

        // 横线
        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(boardSize, pos);
        ctx.stroke();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 背景
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 网格
      drawGrid();

      // 分数
      ctx.fillStyle = "black";
      ctx.font = `${Math.max(16, cellSize * 0.8)}px Arial`;
      ctx.fillText("Score: " + score, 10, 25);

      // 食物
      ctx.fillStyle = "red";
      ctx.fillRect(
        food.x * cellSize,
        food.y * cellSize,
        cellSize,
        cellSize
      );

      // 蛇
      snake.forEach((part, index) => {
        ctx.fillStyle = index === 0 ? "#0b7d0b" : "green";
        ctx.fillRect(
          part.x * cellSize,
          part.y * cellSize,
          cellSize,
          cellSize
        );
      });
    }

    window.addEventListener("resize", resizeCanvas);
    document.addEventListener("keydown", moveSnake);

    food = randomFoodPosition();
    resizeCanvas();
  </script>
</body>
</html>
