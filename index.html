<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Step Game</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app {
      width: min(94vw, 920px);
    }

    .card {
      width: 100%;
      background: #fff;
      border: 2px solid #dcdcdc;
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .hidden {
      display: none !important;
    }

    .title {
      margin: 0 0 20px;
      text-align: center;
      font-size: 44px;
      font-weight: 800;
    }

    .mode-layout {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }

    .mode-desc {
      margin: 0;
      color: #666;
      font-size: 18px;
      text-align: center;
    }

    .mode-buttons {
      width: 100%;
      max-width: 560px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 8px;
    }

    .big-btn,
    .action-btn,
    .dir-btn,
    .back-btn {
      border: none;
      border-radius: 18px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.12s ease, background 0.12s ease, box-shadow 0.12s ease;
    }

    .big-btn:hover,
    .action-btn:hover,
    .dir-btn:hover,
    .back-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    }

    .big-btn:active,
    .action-btn:active,
    .dir-btn:active,
    .back-btn:active {
      transform: scale(0.98);
    }

    .big-btn {
      padding: 22px 16px;
      font-size: 24px;
      background: #f7f7f7;
      border: 2px solid #dcdcdc;
    }

    .single-btn {
      background: #f4fff4;
    }

    .vs-btn {
      background: #f4f8ff;
    }

    .game-layout {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    .game-top {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: stretch;
    }

    .panel {
      border: 2px solid #dcdcdc;
      border-radius: 22px;
      background: #fafafa;
      padding: 18px;
      min-height: 170px;
    }

    .panel-label {
      font-size: 14px;
      color: #666;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
    }

    .score-grid {
      display: grid;
      gap: 14px;
    }

    .score-box {
      border-radius: 16px;
      padding: 12px 14px;
      background: #ffffff;
      border: 2px solid #ececec;
    }

    .score-name {
      font-size: 14px;
      font-weight: 700;
      color: #666;
      margin-bottom: 6px;
    }

    .score-value {
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
    }

    .status-line {
      margin-top: 14px;
      font-size: 18px;
      color: #444;
      font-weight: 600;
    }

    .controls-panel {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .dual-pad {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      align-items: start;
      justify-items: center;
      margin-top: 2px;
    }

    .single-pad-layout {
      grid-template-columns: 1fr;
    }

    .pad-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 180px;
    }

    .pad-title {
      font-size: 14px;
      font-weight: 700;
      color: #555;
      margin-bottom: 8px;
      text-align: center;
    }

    .dpad {
      display: grid;
      grid-template-columns: 46px 46px 46px;
      grid-template-rows: 46px 46px 46px;
      gap: 6px;
      justify-content: center;
    }

    .dpad .empty {
      visibility: hidden;
    }

    .dir-btn {
      width: 46px;
      height: 46px;
      font-size: 20px;
      background: #f2f2f2;
      color: #222;
      border-radius: 14px;
    }

    .canvas-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    #game {
      display: block;
      border: 2px solid #dcdcdc;
      border-radius: 22px;
      background: #ffffff;
    }

    .action-row {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .action-btn {
      padding: 15px 10px;
      font-size: 17px;
      border: 2px solid #dcdcdc;
      background: #fff;
    }

    .start-btn {
      background: #f4fff4;
    }

    .pause-btn {
      background: #fffdf3;
    }

    .restart-btn {
      background: #fff6f6;
    }

    .back-btn {
      background: #f6f8ff;
      border: 2px solid #dcdcdc;
      padding: 15px 10px;
      font-size: 17px;
    }

    .tip {
      width: 100%;
      margin: 0;
      text-align: center;
      color: #666;
      font-size: 15px;
      line-height: 1.6;
    }

    .leaderboards-wrap {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .leaderboard {
      width: 100%;
      border: 2px solid #dcdcdc;
      border-radius: 22px;
      background: #fafafa;
      padding: 20px;
    }

    .leaderboard-title {
      margin: 0 0 14px;
      font-size: 24px;
      font-weight: 800;
      text-align: center;
    }

    .leaderboard-list {
      display: grid;
      gap: 10px;
    }

    .leaderboard-item {
      display: grid;
      grid-template-columns: 64px 1fr 90px;
      gap: 10px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 16px;
      background: #fff;
      border: 2px solid #ececec;
      font-size: 15px;
    }

    .rank {
      font-weight: 800;
      color: #666;
    }

    .entry-label {
      font-weight: 700;
    }

    .entry-score {
      text-align: right;
      font-weight: 800;
      font-size: 18px;
    }

    .empty-board {
      text-align: center;
      color: #777;
      padding: 18px 8px;
      background: #fff;
      border: 2px dashed #ddd;
      border-radius: 16px;
    }

    @media (max-width: 860px) {
      .game-top {
        grid-template-columns: 1fr;
      }

      .leaderboards-wrap {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 760px) {
      .title {
        font-size: 34px;
      }

      .mode-buttons {
        grid-template-columns: 1fr;
      }

      .action-row {
        grid-template-columns: 1fr 1fr;
      }

      .dual-pad {
        grid-template-columns: 1fr;
      }

      .single-pad-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 16px;
      }

      .action-row {
        grid-template-columns: 1fr;
      }

      .leaderboard-item {
        grid-template-columns: 52px 1fr 76px;
        font-size: 14px;
      }

      .entry-score {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="modePage" class="card">
      <div class="mode-layout">
        <h1 class="title">Snake Step Game</h1>
        <p class="mode-desc">Choose a mode and start the game.</p>
        <div class="mode-buttons">
          <button class="big-btn single-btn" id="singleModeBtn">Single Player</button>
          <button class="big-btn vs-btn" id="twoPlayerModeBtn">Two Players VS</button>
        </div>
      </div>
    </section>

    <section id="gamePage" class="card hidden">
      <div class="game-layout">
        <h1 class="title" id="gameTitle">Snake Step Game</h1>

        <div class="game-top">
          <div class="panel">
            <div class="panel-label">Score Board</div>
            <div class="score-grid">
              <div class="score-box">
                <div class="score-name" id="player1Name">Player 1</div>
                <div class="score-value" id="score1">0</div>
              </div>
              <div class="score-box hidden" id="player2Box">
                <div class="score-name">Player 2</div>
                <div class="score-value" id="score2">0</div>
              </div>
            </div>
            <div class="status-line" id="statusText">Status: Ready</div>
          </div>

          <div class="panel controls-panel">
            <div class="panel-label">Direction Pad</div>

            <div class="dual-pad single-pad-layout" id="dualPad">
              <div class="pad-block">
                <div class="pad-title">P1 (Arrow Keys)</div>
                <div class="dpad">
                  <div class="empty"></div>
                  <button class="dir-btn" id="upBtn">↑</button>
                  <div class="empty"></div>

                  <button class="dir-btn" id="leftBtn">←</button>
                  <div class="empty"></div>
                  <button class="dir-btn" id="rightBtn">→</button>

                  <div class="empty"></div>
                  <button class="dir-btn" id="downBtn">↓</button>
                  <div class="empty"></div>
                </div>
              </div>

              <div class="pad-block hidden" id="wasdBlock">
                <div class="pad-title">P2 (WASD)</div>
                <div class="dpad">
                  <div class="empty"></div>
                  <button class="dir-btn" id="wBtn">W</button>
                  <div class="empty"></div>

                  <button class="dir-btn" id="aBtn">A</button>
                  <div class="empty"></div>
                  <button class="dir-btn" id="dBtn">D</button>

                  <div class="empty"></div>
                  <button class="dir-btn" id="sBtn">S</button>
                  <div class="empty"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="game"></canvas>
        </div>

        <div class="action-row">
          <button class="action-btn start-btn" id="startBtn">Start</button>
          <button class="action-btn pause-btn" id="pauseBtn">Pause</button>
          <button class="action-btn restart-btn" id="restartBtn">Restart</button>
          <button class="back-btn" id="backBtn">Back</button>
        </div>

        <p class="tip" id="tipText">
          Single mode: use Arrow Keys or the P1 pad. Step-based movement: one press, one move.
        </p>

        <div class="leaderboards-wrap">
          <div class="leaderboard">
            <h2 class="leaderboard-title">Single Player Leaderboard</h2>
            <div class="leaderboard-list" id="singleLeaderboardList"></div>
          </div>

          <div class="leaderboard">
            <h2 class="leaderboard-title">VS Mode Leaderboard</h2>
            <div class="leaderboard-list" id="vsLeaderboardList"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const modePage = document.getElementById("modePage");
    const gamePage = document.getElementById("gamePage");

    const singleModeBtn = document.getElementById("singleModeBtn");
    const twoPlayerModeBtn = document.getElementById("twoPlayerModeBtn");

    const gameTitle = document.getElementById("gameTitle");
    const score1El = document.getElementById("score1");
    const score2El = document.getElementById("score2");
    const player1NameEl = document.getElementById("player1Name");
    const player2Box = document.getElementById("player2Box");
    const statusText = document.getElementById("statusText");
    const tipText = document.getElementById("tipText");

    const singleLeaderboardList = document.getElementById("singleLeaderboardList");
    const vsLeaderboardList = document.getElementById("vsLeaderboardList");

    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const restartBtn = document.getElementById("restartBtn");
    const backBtn = document.getElementById("backBtn");

    const upBtn = document.getElementById("upBtn");
    const downBtn = document.getElementById("downBtn");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");

    const wBtn = document.getElementById("wBtn");
    const aBtn = document.getElementById("aBtn");
    const sBtn = document.getElementById("sBtn");
    const dBtn = document.getElementById("dBtn");

    const dualPad = document.getElementById("dualPad");
    const wasdBlock = document.getElementById("wasdBlock");

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const gridCount = 20;
    let boardSize = 520;
    let cellSize = 26;

    let currentMode = "single";
    let gameStarted = false;
    let paused = false;
    let gameOver = false;
    let winnerText = "";

    let snake1 = [];
    let snake2 = [];
    let food = { x: 5, y: 5 };

    let score1 = 0;
    let score2 = 0;

    function getLeaderboard() {
      const raw = localStorage.getItem("snakeLeaderboard");
      return raw ? JSON.parse(raw) : [];
    }

    function saveLeaderboard(board) {
      localStorage.setItem("snakeLeaderboard", JSON.stringify(board));
    }

    function addLeaderboardEntry(mode, label, score) {
      const board = getLeaderboard();
      board.push({
        mode,
        label,
        score,
        time: Date.now()
      });

      board.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.time - b.time;
      });

      saveLeaderboard(board.slice(0, 12));
      renderLeaderboards();
    }

    function renderBoardSection(container, list) {
      container.innerHTML = "";

      if (list.length === 0) {
        container.innerHTML = `<div class="empty-board">No records yet. Play a game to set one.</div>`;
        return;
      }

      list.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "leaderboard-item";
        row.innerHTML = `
          <div class="rank">#${index + 1}</div>
          <div class="entry-label">${item.label}</div>
          <div class="entry-score">${item.score}</div>
        `;
        container.appendChild(row);
      });
    }

    function renderLeaderboards() {
      const board = getLeaderboard();
      const singleList = board.filter(item => item.mode === "single").slice(0, 5);
      const vsList = board.filter(item => item.mode === "vs").slice(0, 5);

      renderBoardSection(singleLeaderboardList, singleList);
      renderBoardSection(vsLeaderboardList, vsList);
    }

    function resizeCanvas() {
      const maxWidth = Math.min(window.innerWidth * 0.78, 700);
      boardSize = Math.floor(maxWidth / gridCount) * gridCount;
      cellSize = boardSize / gridCount;
      canvas.width = boardSize;
      canvas.height = boardSize;
      draw();
    }

    function getAllSnakeParts() {
      return currentMode === "single" ? [...snake1] : [...snake1, ...snake2];
    }

    function randomFoodPosition() {
      let position;
      let occupied;

      do {
        occupied = false;
        position = {
          x: Math.floor(Math.random() * gridCount),
          y: Math.floor(Math.random() * gridCount)
        };

        const allSnakes = getAllSnakeParts();
        for (const part of allSnakes) {
          if (part.x === position.x && part.y === position.y) {
            occupied = true;
            break;
          }
        }
      } while (occupied);

      return position;
    }

    function updatePadVisibility() {
      if (currentMode === "single") {
        wasdBlock.classList.add("hidden");
        dualPad.classList.add("single-pad-layout");
      } else {
        wasdBlock.classList.remove("hidden");
        dualPad.classList.remove("single-pad-layout");
      }
    }

    function initMode(mode) {
      currentMode = mode;
      gameStarted = false;
      paused = false;
      gameOver = false;
      winnerText = "";
      score1 = 0;
      score2 = 0;

      snake1 = [{ x: 6, y: 10 }];

      if (mode === "single") {
        snake2 = [];
        gameTitle.textContent = "Snake Step Game";
        player1NameEl.textContent = "Player 1";
        player2Box.classList.add("hidden");
        tipText.textContent = "Single mode: use Arrow Keys or the P1 pad. Step-based movement: one press, one move.";
      } else {
        snake2 = [{ x: 13, y: 10 }];
        gameTitle.textContent = "Snake Step Game - VS Mode";
        player1NameEl.textContent = "Player 1";
        player2Box.classList.remove("hidden");
        tipText.textContent = "VS mode: Player 1 uses Arrow Keys or the P1 pad. Player 2 uses W A S D or the P2 pad.";
      }

      updatePadVisibility();
      food = randomFoodPosition();
      updateInfo();
      draw();
    }

    function showModePage() {
      modePage.classList.remove("hidden");
      gamePage.classList.add("hidden");
    }

    function showGamePage(mode) {
      modePage.classList.add("hidden");
      gamePage.classList.remove("hidden");
      initMode(mode);
      resizeCanvas();
      renderLeaderboards();
    }

    function updateInfo() {
      score1El.textContent = score1;
      score2El.textContent = score2;

      if (gameOver) {
        statusText.textContent = `Status: ${winnerText || "Game Over"}`;
      } else if (!gameStarted) {
        statusText.textContent = "Status: Ready";
      } else if (paused) {
        statusText.textContent = "Status: Paused";
      } else {
        statusText.textContent = "Status: Playing";
      }
    }

    function startGame() {
      if (gameOver) return;
      gameStarted = true;
      paused = false;
      updateInfo();
      draw();
    }

    function pauseGame() {
      if (!gameStarted || gameOver) return;
      paused = !paused;
      updateInfo();
      draw();
    }

    function restartGame() {
      initMode(currentMode);
      gameStarted = true;
      paused = false;
      updateInfo();
      draw();
    }

    function snakeContains(snake, x, y) {
      return snake.some(part => part.x === x && part.y === y);
    }

    function endSingleGame(reason) {
      gameOver = true;
      gameStarted = false;
      winnerText = "Game Over";
      updateInfo();
      draw();
      addLeaderboardEntry("single", "Single Player", score1);
      setTimeout(() => {
        alert(`${reason}\nYour score: ${score1}`);
      }, 40);
    }

    function endVsGame(winner, reason) {
      gameOver = true;
      gameStarted = false;
      winnerText = `${winner} Wins`;
      updateInfo();
      draw();

      const bestScore = Math.max(score1, score2);
      addLeaderboardEntry("vs", winner, bestScore);

      setTimeout(() => {
        alert(`${reason}\n${winner} wins!\nPlayer 1: ${score1}\nPlayer 2: ${score2}`);
      }, 40);
    }

    function moveSingle(dx, dy) {
      if (!gameStarted || paused || gameOver) return;

      const head = {
        x: snake1[0].x + dx,
        y: snake1[0].y + dy
      };

      if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount) {
        endSingleGame("You hit the wall.");
        return;
      }

      if (snakeContains(snake1, head.x, head.y)) {
        endSingleGame("You hit yourself.");
        return;
      }

      snake1.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score1 += 1;
        food = randomFoodPosition();
      } else {
        snake1.pop();
      }

      updateInfo();
      draw();
    }

    function moveVs(player, dx, dy) {
      if (!gameStarted || paused || gameOver) return;

      const selfSnake = player === 1 ? snake1 : snake2;
      const otherSnake = player === 1 ? snake2 : snake1;

      const head = {
        x: selfSnake[0].x + dx,
        y: selfSnake[0].y + dy
      };

      if (head.x < 0 || head.x >= gridCount || head.y < 0 || head.y >= gridCount) {
        endVsGame(player === 1 ? "Player 2" : "Player 1", `Player ${player} hit the wall.`);
        return;
      }

      if (snakeContains(selfSnake, head.x, head.y)) {
        endVsGame(player === 1 ? "Player 2" : "Player 1", `Player ${player} hit their own snake.`);
        return;
      }

      if (snakeContains(otherSnake, head.x, head.y)) {
        endVsGame(player === 1 ? "Player 2" : "Player 1", `Player ${player} hit the opponent.`);
        return;
      }

      selfSnake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        if (player === 1) {
          score1 += 1;
        } else {
          score2 += 1;
        }
        food = randomFoodPosition();
      } else {
        selfSnake.pop();
      }

      updateInfo();
      draw();
    }

    function handleKeydown(event) {
      if (currentMode === "single") {
        if (event.key === "ArrowUp") {
          event.preventDefault();
          moveSingle(0, -1);
        } else if (event.key === "ArrowDown") {
          event.preventDefault();
          moveSingle(0, 1);
        } else if (event.key === "ArrowLeft") {
          event.preventDefault();
          moveSingle(-1, 0);
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          moveSingle(1, 0);
        }
        return;
      }

      if (currentMode === "vs") {
        if (event.key === "ArrowUp") {
          event.preventDefault();
          moveVs(1, 0, -1);
        } else if (event.key === "ArrowDown") {
          event.preventDefault();
          moveVs(1, 0, 1);
        } else if (event.key === "ArrowLeft") {
          event.preventDefault();
          moveVs(1, -1, 0);
        } else if (event.key === "ArrowRight") {
          event.preventDefault();
          moveVs(1, 1, 0);
        } else if (event.key === "w" || event.key === "W") {
          moveVs(2, 0, -1);
        } else if (event.key === "s" || event.key === "S") {
          moveVs(2, 0, 1);
        } else if (event.key === "a" || event.key === "A") {
          moveVs(2, -1, 0);
        } else if (event.key === "d" || event.key === "D") {
          moveVs(2, 1, 0);
        }
      }
    }

    function drawGrid() {
      ctx.strokeStyle = "#eeeeee";
      ctx.lineWidth = 1;

      for (let i = 0; i <= gridCount; i++) {
        const pos = i * cellSize;

        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, boardSize);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(boardSize, pos);
        ctx.stroke();
      }
    }

    function roundRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function drawFood() {
      const x = food.x * cellSize;
      const y = food.y * cellSize;
      const radius = Math.max(4, cellSize * 0.22);

      ctx.fillStyle = "#ff4d4f";
      roundRect(x + 2, y + 2, cellSize - 4, cellSize - 4, radius);
      ctx.fill();
    }

    function drawSnake(snake, headColor, bodyColor) {
      snake.forEach((part, index) => {
        const x = part.x * cellSize;
        const y = part.y * cellSize;
        const radius = Math.max(4, cellSize * 0.22);

        ctx.fillStyle = index === 0 ? headColor : bodyColor;
        roundRect(x + 2, y + 2, cellSize - 4, cellSize - 4, radius);
        ctx.fill();
      });
    }

    function drawOverlay() {
      if (!gameStarted || paused || gameOver) {
        ctx.fillStyle = "rgba(255,255,255,0.74)";
        roundRect(24, boardSize / 2 - 50, boardSize - 48, 100, 18);
        ctx.fill();

        ctx.fillStyle = "#222";
        ctx.font = `bold ${Math.max(18, cellSize * 0.78)}px Arial`;
        ctx.textAlign = "center";

        let text = "Press Start";
        if (paused) text = "Paused";
        if (gameOver) text = winnerText || "Game Over";

        ctx.fillText(text, boardSize / 2, boardSize / 2 + 10);
        ctx.textAlign = "start";
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawGrid();
      drawFood();
      drawSnake(snake1, "#0b7d0b", "#19a319");

      if (currentMode === "vs") {
        drawSnake(snake2, "#1664d9", "#3f8cff");
      }

      drawOverlay();
    }

    singleModeBtn.addEventListener("click", () => showGamePage("single"));
    twoPlayerModeBtn.addEventListener("click", () => showGamePage("vs"));

    startBtn.addEventListener("click", startGame);
    pauseBtn.addEventListener("click", pauseGame);
    restartBtn.addEventListener("click", restartGame);
    backBtn.addEventListener("click", showModePage);

    upBtn.addEventListener("click", () => {
      if (currentMode === "single") moveSingle(0, -1);
      else moveVs(1, 0, -1);
    });

    downBtn.addEventListener("click", () => {
      if (currentMode === "single") moveSingle(0, 1);
      else moveVs(1, 0, 1);
    });

    leftBtn.addEventListener("click", () => {
      if (currentMode === "single") moveSingle(-1, 0);
      else moveVs(1, -1, 0);
    });

    rightBtn.addEventListener("click", () => {
      if (currentMode === "single") moveSingle(1, 0);
      else moveVs(1, 1, 0);
    });

    wBtn.addEventListener("click", () => {
      if (currentMode === "vs") moveVs(2, 0, -1);
    });

    aBtn.addEventListener("click", () => {
      if (currentMode === "vs") moveVs(2, -1, 0);
    });

    sBtn.addEventListener("click", () => {
      if (currentMode === "vs") moveVs(2, 0, 1);
    });

    dBtn.addEventListener("click", () => {
      if (currentMode === "vs") moveVs(2, 1, 0);
    });

    document.addEventListener("keydown", handleKeydown);
    window.addEventListener("resize", resizeCanvas);

    renderLeaderboards();
    resizeCanvas();
  </script>
</body>
</html>
